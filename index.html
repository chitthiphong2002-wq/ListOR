<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ListsOR Pro - Surgical Workflow</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyAZ1RDykpCCRdvu8DDmxYFWILlKUPuxDtg",
      authDomain: "listsor-6049b.firebaseapp.com",
      projectId: "listsor-6049b",
      storageBucket: "listsor-6049b.firebasestorage.app",
      messagingSenderId: "76589470807",
      appId: "1:76589470807:web:3937ba3148c3eede0dbf12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Global State
    window._db = db;
    window.allTemplates = [];
    window.currentSteps = [];
    window.selectedColor = '#2563EB';
    window.editId = null;

    // --- Authentication ---
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        await signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
      } else {
        window._uid = user.uid;
        startListener();
        document.getElementById('appSection').style.display = 'block';
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    });

    // --- Realtime Listener ---
    function startListener() {
      const q = query(collection(db, 'users', window._uid, 'templates'), orderBy('updated_at', 'desc'));
      onSnapshot(q, snap => {
        window.allTemplates = snap.docs.map(d => ({ __backendId: d.id, ...d.data() }));
        window.renderTemplates();
      });
    }

    // --- Database Operations ---
    window.saveTemplate = async () => {
        const name = document.getElementById('inputSurgery').value;
        if (!name) return alert('กรุณาระบุชื่อหัตถการ');
        
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = 'กำลังบันทึก...';

        const data = {
          template_name: name,
          color: window.selectedColor,
          steps_json: JSON.stringify(window.currentSteps),
          updated_at: serverTimestamp()
        };

        try {
            if (window.editId) {
              await setDoc(doc(db, 'users', window._uid, 'templates', window.editId), data);
            } else {
              await addDoc(collection(db, 'users', window._uid, 'templates'), data);
            }
            window.closeModal();
        } catch (e) {
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'บันทึกข้อมูล';
        }
    };

    window.deleteTemplate = async (id) => {
        if(confirm('คุณต้องการลบเทมเพลตนี้ใช่หรือไม่?')) {
            await deleteDoc(doc(db, 'users', window._uid, 'templates', id));
            window.closeModal();
        }
    };
  </script>

  <style>
    :root { --accent: #2563EB; --bg: #F8FAFC; --border: #E2E8F0; }
    body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background: var(--bg); margin: 0; color: #1E293B; }
    
    .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { background: #94A3B8; cursor: not-allowed; }

    .card { background: white; border-radius: 16px; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; overflow: hidden; }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    
    .inp { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px; box-sizing: border-box; outline: none; transition: 0.2s; }
    .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

    /* Step Boxes */
    .step-box { background: white; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; border-left-width: 8px; transition: 0.2s; }
    .step-header { padding: 10px 14px; background: #F8FAFC; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .color-dot-sm { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #cbd5e1; }
    .color-dot-sm.active { box-shadow: 0 0 0 2px var(--accent); transform: scale(1.1); }

    /* Loading Spinner */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay" style="position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px;">
    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="font-weight: 500; color: #64748B;">กำลังซิงค์ข้อมูลกับ ListsOR Cloud...</p>
</div>

<div id="appSection" style="display: none;">
  <header style="background: white; border-bottom: 1px solid var(--border); padding: 16px 24px; position: sticky; top: 0; z-index: 50;">
    <div style="max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div style="background: var(--accent); color: white; padding: 6px; border-radius: 10px;"><i data-lucide="activity" size="20"></i></div>
        <h1 style="margin: 0; font-size: 20px; font-weight: 800; color: #1E293B;">ListsOR Pro</h1>
      </div>
      <button onclick="openCreateModal()" class="btn-primary"><i data-lucide="plus" size="18"></i> เพิ่มเคสผ่าตัด</button>
    </div>
  </header>

  <main style="max-width: 1000px; margin: 30px auto; padding: 0 20px;">
    <div id="templateList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
  </main>
</div>

<!-- Modal -->
<div id="modal" style="display: none; position: fixed; inset: 0; z-index: 100;">
  <div onclick="closeModal()" style="position: absolute; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px);"></div>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 95%; max-width: 550px; border-radius: 24px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
    
    <div style="padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
      <h2 id="modalTitle" style="margin:0; font-size: 18px; font-weight: 700;">ข้อมูลหัตถการ</h2>
      <button onclick="closeModal()" style="border:none; background:#F1F5F9; border-radius:50%; width:32px; height:32px; cursor:pointer;"><i data-lucide="x" size="16"></i></button>
    </div>

    <div style="padding: 24px; overflow-y: auto; flex: 1;">
      <label style="font-size: 13px; font-weight: 600; color: #64748B; display: block; margin-bottom: 8px;">ชื่อการผ่าตัด</label>
      <input id="inputSurgery" type="text" class="inp" placeholder="เช่น Phacoemulsification, TKRs...">
      
      <div style="margin: 20px 0;">
        <label style="font-size: 13px; font-weight: 600; color: #64748B; display: block; margin-bottom: 10px;">สีหลักของเทมเพลต</label>
        <div id="mainColorPicker" style="display: flex; gap: 10px;"></div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 12px;">
        <label style="font-size: 13px; font-weight: 600; color: #64748B;">ขั้นตอนและวิธีการ</label>
        <button onclick="addNewStep()" style="color: var(--accent); background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px;">
          <i data-lucide="plus-circle" size="14"></i> เพิ่มขั้นตอน
        </button>
      </div>
      
      <div id="stepsContainer"></div>
    </div>

    <div id="modalFooter" style="padding: 20px 24px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 2fr; gap: 12px;">
      <!-- Dynamic Buttons -->
    </div>
  </div>
</div>

<script>
  const THEME_COLORS = ['#2563EB', '#7C3AED', '#DB2777', '#DC2626', '#EA580C', '#D97706', '#16A34A', '#0891B2', '#64748B'];

  window.renderTemplates = () => {
    const list = document.getElementById('templateList');
    if (window.allTemplates.length === 0) {
        list.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #94A3B8; border: 2px dashed var(--border); border-radius: 20px;">
            <i data-lucide="folder-open" size="48" style="margin-bottom: 10px; opacity: 0.5;"></i>
            <p>ยังไม่มีข้อมูลหัตถการของคุณ</p>
        </div>`;
    } else {
        list.innerHTML = window.allTemplates.map(t => {
            const steps = JSON.parse(t.steps_json || '[]');
            return `
              <div class="card" onclick="openEditModal('${t.__backendId}')">
                <div style="height: 6px; background: ${t.color}"></div>
                <div style="padding: 20px;">
                  <h3 style="margin: 0 0 10px 0; font-size: 16px; font-weight: 700; line-height: 1.4;">${t.template_name}</h3>
                  <span style="font-size: 12px; color: #64748B; background: #F1F5F9; padding: 4px 8px; border-radius: 6px;">${steps.length} ขั้นตอน</span>
                </div>
              </div>
            `;
        }).join('');
    }
    lucide.createIcons();
  };

  window.openCreateModal = () => {
    window.editId = null; 
    window.currentSteps = []; 
    window.selectedColor = THEME_COLORS[0];
    initModal();
  };

  window.openEditModal = (id) => {
    const t = window.allTemplates.find(x => x.__backendId === id);
    window.editId = id; 
    window.selectedColor = t.color; 
    window.currentSteps = JSON.parse(t.steps_json);
    initModal(t.template_name);
  };

  function initModal(name = '') {
    document.getElementById('inputSurgery').value = name;
    renderMainColorPicker();
    renderStepsList();
    renderFooter();
    document.getElementById('modal').style.display = 'block';
  }

  function renderMainColorPicker() {
    const container = document.getElementById('mainColorPicker');
    container.innerHTML = THEME_COLORS.map(c => `
      <div onclick="window.selectedColor='${c}'; renderMainColorPicker()" 
           style="background:${c}; width:24px; height:24px; border-radius:50%; cursor:pointer; border: ${window.selectedColor === c ? '3px solid #1E293B' : '3px solid white'}; box-shadow: 0 0 0 1px #E2E8F0;"></div>
    `).join('');
  }

  window.addNewStep = () => {
    window.currentSteps.push({ text: '', note: '', color: '#CBD5E1' }); // Default step color
    renderStepsList();
  };

  window.renderStepsList = () => {
    const container = document.getElementById('stepsContainer');
    container.innerHTML = window.currentSteps.map((s, i) => `
      <div class="step-box" style="border-left-color: ${s.color}">
        <div class="step-header">
          <span style="font-weight: 800; color: #94A3B8; font-size: 12px;">${i+1}</span>
          <input type="text" value="${s.text}" oninput="window.currentSteps[${i}].text=this.value" placeholder="ชื่อขั้นตอน..." style="flex:1; border:none; background:none; font-weight:600; outline:none; font-size:14px;">
          <div style="display: flex; gap: 5px;">
            ${['#2563EB', '#EA580C', '#16A34A', '#DC2626', '#64748B'].map(c => `
              <div onclick="updateStepColor(${i}, '${c}')" class="color-dot-sm ${s.color === c ? 'active' : ''}" style="background:${c}"></div>
            `).join('')}
          </div>
          <button onclick="removeStep(${i})" style="border:none; background:none; color:#FCA5A5; cursor:pointer; padding: 4px;"><i data-lucide="trash-2" size="14"></i></button>
        </div>
        <textarea oninput="window.currentSteps[${i}].note=this.value" placeholder="รายละเอียด/เครื่องมือที่ใช้..." style="width:100%; border:none; padding:12px; font-size:13px; outline:none; resize:none; color: #64748B; font-family: inherit;">${s.note}</textarea>
      </div>
    `).join('');
    lucide.createIcons();
  };

  window.updateStepColor = (i, color) => {
    window.currentSteps[i].color = color;
    renderStepsList();
  };

  window.removeStep = (i) => { 
    window.currentSteps.splice(i, 1); 
    renderStepsList(); 
  };

  function renderFooter() {
    const footer = document.getElementById('modalFooter');
    footer.innerHTML = `
      <button onclick="${window.editId ? `deleteTemplate('${window.editId}')` : 'closeModal()'}" 
              style="padding:12px; border:1px solid #E2E8F0; background:#F8FAFC; border-radius:12px; cursor:pointer; font-weight:600; color:${window.editId ? '#EF4444' : '#64748B'}">
        ${window.editId ? 'ลบทิ้ง' : 'ยกเลิก'}
      </button>
      <button id="saveBtn" onclick="saveTemplate()" class="btn-primary" style="justify-content:center;">
        บันทึกข้อมูล
      </button>
    `;
  }

  window.closeModal = () => document.getElementById('modal').style.display = 'none';

  lucide.createIcons();
</script>
</body>
</html>
