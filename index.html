<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ListsOR - Surgical Workflow</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ1RDykpCCRdvu8DDmxYFWILlKUPuxDtg",
      authDomain: "listsor-6049b.firebaseapp.com",
      projectId: "listsor-6049b",
      storageBucket: "listsor-6049b.firebasestorage.app",
      messagingSenderId: "76589470807",
      appId: "1:76589470807:web:3937ba3148c3eede0dbf12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window._db = db;
    window.allTemplates = [];
    window.currentSteps = [];
    window.selectedColor = '#2563EB';
    window.editId = null;
    window.isReadOnly = false;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        await signInAnonymously(auth);
      } else {
        window._uid = user.uid;
        startListener();
        document.getElementById('appSection').style.display = 'block';
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    });

    function startListener() {
      const q = query(collection(db, 'users', window._uid, 'templates'), orderBy('updated_at', 'desc'));
      onSnapshot(q, snap => {
        window.allTemplates = snap.docs.map(d => ({ __backendId: d.id, ...d.data() }));
        window.renderTemplates();
      });
    }

    // ฟังก์ชันทำสำเนา (Duplicate)
    window.duplicateTemplate = async (e, id) => {
        e.stopPropagation();
        if(!confirm('คุณต้องการทำสำเนาเทมเพลตนี้ใช่หรือไม่?')) return;
        
        const source = window.allTemplates.find(t => t.__backendId === id);
        const newData = {
            ...source,
            template_name: source.template_name + " (สำเนา)",
            updated_at: serverTimestamp()
        };
        delete newData.__backendId;

        try {
            await addDoc(collection(db, 'users', window._uid, 'templates'), newData);
        } catch (err) {
            alert('เกิดข้อผิดพลาดในการทำสำเนา');
        }
    };

    window.saveTemplate = async () => {
        const name = document.getElementById('inputSurgery').value;
        const mainNote = document.getElementById('inputMainNote').value;
        if (!name) return alert('กรุณาระบุชื่อหัตถการ');
        
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;

        const data = {
          template_name: name,
          main_note: mainNote,
          color: window.selectedColor,
          steps_json: JSON.stringify(window.currentSteps),
          updated_at: serverTimestamp()
        };

        try {
            if (window.editId) {
              await setDoc(doc(db, 'users', window._uid, 'templates', window.editId), data);
            } else {
              await addDoc(collection(db, 'users', window._uid, 'templates'), data);
            }
            window.closeModal();
        } finally {
            btn.disabled = false;
        }
    };

    window.deleteTemplateDirect = async (e, id) => {
        e.stopPropagation();
        if(confirm('คุณแน่ใจว่าต้องการลบเทมเพลตนี้?')) {
            await deleteDoc(doc(db, 'users', window._uid, 'templates', id));
        }
    };
  </script>

  <style>
    :root { --accent: #2563EB; --bg: #F8FAFC; --border: #E2E8F0; }
    body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background: var(--bg); margin: 0; color: #1E293B; }
    .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    
    .card { background: white; border-radius: 16px; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; overflow: hidden; position: relative; }
    .card:hover { border-color: var(--accent); box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
    .card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; opacity: 0; transition: 0.2s; }
    .card:hover .card-actions { opacity: 1; }
    .action-btn { background: white; border: 1px solid var(--border); padding: 6px; border-radius: 8px; cursor: pointer; color: #64748B; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
    .action-btn:hover { background: #F1F5F9; color: var(--accent); border-color: var(--accent); }
    .action-btn.delete:hover { color: #EF4444; border-color: #EF4444; }

    .inp { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px; box-sizing: border-box; outline: none; }
    .inp:disabled { background: #F8FAFC; color: #1E293B; border-color: transparent; }
    
    .step-box { background: white; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; border-left: 8px solid #ccc; }
    .step-header { padding: 10px 14px; background: #F8FAFC; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .color-dot-sm { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #cbd5e1; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loadingOverlay" style="position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px;">
    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p>กำลังซิงค์ข้อมูล...</p>
</div>

<div id="appSection" style="display: none;">
  <header style="background: white; border-bottom: 1px solid var(--border); padding: 16px 24px; position: sticky; top: 0; z-index: 50;">
    <div style="max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
      <h1 style="margin: 0; font-size: 20px; font-weight: 800; color: var(--accent);">ListsOR Pro</h1>
      <button onclick="openCreateModal()" class="btn-primary"><i data-lucide="plus"></i> เพิ่มเคสผ่าตัด</button>
    </div>
  </header>

  <main style="max-width: 1000px; margin: 30px auto; padding: 0 20px;">
    <div id="templateList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
  </main>
</div>

<!-- Modal -->
<div id="modal" style="display: none; position: fixed; inset: 0; z-index: 100;">
  <div onclick="closeModal()" style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);"></div>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 95%; max-width: 550px; border-radius: 24px; max-height: 85vh; display: flex; flex-direction: column;">
    
    <div style="padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
      <h2 id="modalTitle" style="margin:0; font-size: 18px; font-weight: 700;">ข้อมูลหัตถการ</h2>
      <button onclick="closeModal()" style="border:none; background:#F1F5F9; border-radius:50%; width:32px; height:32px; cursor:pointer;"><i data-lucide="x" size="16"></i></button>
    </div>

    <div style="padding: 24px; overflow-y: auto; flex: 1;">
      <label style="font-size: 13px; font-weight: 600; color: #64748B; display: block; margin-bottom: 6px;">ชื่อการผ่าตัด</label>
      <input id="inputSurgery" type="text" class="inp" placeholder="ระบุชื่อการผ่าตัด..." style="font-weight: 700;">
      
      <label style="font-size: 13px; font-weight: 600; color: #64748B; display: block; margin-top: 15px; margin-bottom: 6px;">Note / หมายเหตุรวม</label>
      <textarea id="inputMainNote" class="inp" placeholder="ระบุข้อมูลเพิ่มเติมของเคสนี้..." style="resize: none; height: 80px; font-family: inherit;"></textarea>

      <div id="colorPickerSection" style="margin: 20px 0;">
        <label style="font-size: 13px; font-weight: 600; color: #64748B; display: block; margin-bottom: 10px;">สีหลักของเทมเพลต</label>
        <div id="mainColorPicker" style="display: flex; gap: 10px;"></div>
      </div>

      <div style="margin-top: 25px; margin-bottom: 12px;">
        <label style="font-size: 13px; font-weight: 600; color: #64748B;">ขั้นตอนและวิธีการ</label>
      </div>
      
      <div id="stepsContainer"></div>

      <button id="addStepBtn" onclick="addNewStep()" style="width: 100%; padding: 14px; border: 2px dashed #CBD5E1; border-radius: 16px; background: #F8FAFC; color: #2563EB; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <i data-lucide="plus-circle" size="18"></i> เพิ่มขั้นตอน
      </button>
    </div>

    <div id="modalFooter" style="padding: 20px 24px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 2fr; gap: 12px;"></div>
  </div>
</div>

<script>
  const COLORS = ['#2563EB', '#7C3AED', '#DB2777', '#DC2626', '#EA580C', '#D97706', '#16A34A', '#0891B2', '#64748B'];

  window.renderTemplates = () => {
    const list = document.getElementById('templateList');
    list.innerHTML = window.allTemplates.map(t => `
      <div class="card" onclick="openViewModal('${t.__backendId}')">
        <div style="height: 6px; background: ${t.color}"></div>
        <div style="padding: 24px 20px;">
          <h3 style="margin: 0; font-size: 16px; font-weight: 700;">${t.template_name}</h3>
          <div style="display: inline-block; margin-top: 8px; padding: 4px 10px; background: #F1F5F9; border-radius: 8px; font-size: 12px; color: #64748B;">
            ${JSON.parse(t.steps_json).length} ขั้นตอน
          </div>
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="openEditModal(event, '${t.__backendId}')" title="แก้ไข"><i data-lucide="edit-3" size="14"></i></button>
          <button class="action-btn" onclick="duplicateTemplate(event, '${t.__backendId}')" title="ทำสำเนา"><i data-lucide="copy" size="14"></i></button>
          <button class="action-btn delete" onclick="deleteTemplateDirect(event, '${t.__backendId}')" title="ลบ"><i data-lucide="trash-2" size="14"></i></button>
        </div>
      </div>
    `).join('');
    lucide.createIcons();
  };

  window.openViewModal = (id) => {
    window.isReadOnly = true;
    const t = window.allTemplates.find(x => x.__backendId === id);
    window.editId = id; window.selectedColor = t.color; window.currentSteps = JSON.parse(t.steps_json);
    initModal(t.template_name, t.main_note || '');
    document.getElementById('modalTitle').textContent = 'รายละเอียดหัตถการ (View Only)';
  };

  window.openEditModal = (e, id) => {
    if(e) e.stopPropagation();
    window.isReadOnly = false;
    const t = window.allTemplates.find(x => x.__backendId === id);
    window.editId = id; window.selectedColor = t.color; window.currentSteps = JSON.parse(t.steps_json);
    initModal(t.template_name, t.main_note || '');
    document.getElementById('modalTitle').textContent = 'แก้ไขหัตถการ';
  };

  window.openCreateModal = () => {
    window.isReadOnly = false;
    window.editId = null; window.currentSteps = []; window.selectedColor = COLORS[0];
    initModal();
    document.getElementById('modalTitle').textContent = 'สร้างเคสผ่าตัดใหม่';
  };

  function initModal(name = '', mainNote = '') {
    const surgeryInp = document.getElementById('inputSurgery');
    const noteInp = document.getElementById('inputMainNote');
    const colorSec = document.getElementById('colorPickerSection');
    const addStepBtn = document.getElementById('addStepBtn');

    surgeryInp.value = name;
    noteInp.value = mainNote;
    
    surgeryInp.disabled = window.isReadOnly;
    noteInp.disabled = window.isReadOnly;
    colorSec.style.display = window.isReadOnly ? 'none' : 'block';
    addStepBtn.style.display = window.isReadOnly ? 'none' : 'flex';

    renderMainColorPicker();
    renderStepsList();
    renderFooter();
    document.getElementById('modal').style.display = 'block';
  }

  function renderMainColorPicker() {
    const container = document.getElementById('mainColorPicker');
    if(window.isReadOnly) { container.innerHTML = ''; return; }
    container.innerHTML = COLORS.map(c => `
      <div onclick="window.selectedColor='${c}'; renderMainColorPicker()" 
           style="background:${c}; width:24px; height:24px; border-radius:50%; cursor:pointer; border: ${window.selectedColor === c ? '3px solid #1E293B' : '3px solid white'}; box-shadow: 0 0 0 1px #E2E8F0;"></div>
    `).join('');
  }

  window.renderStepsList = () => {
    const container = document.getElementById('stepsContainer');
    container.innerHTML = window.currentSteps.map((s, i) => `
      <div class="step-box" style="border-left-color: ${s.color}">
        <div class="step-header">
          <span style="font-weight: 800; color: #94A3B8; font-size: 12px;">${i+1}</span>
          <input type="text" value="${s.text}" oninput="window.currentSteps[${i}].text=this.value" 
                 ${window.isReadOnly ? 'disabled' : ''} placeholder="ระบุขั้นตอน..." 
                 style="flex:1; border:none; background:none; font-weight:600; outline:none; font-size:14px;">
          <div style="display: ${window.isReadOnly ? 'none' : 'flex'}; gap: 5px;">
            ${['#2563EB', '#EA580C', '#16A34A', '#DC2626', '#64748B'].map(c => `
              <div onclick="updateStepColor(${i}, '${c}')" class="color-dot-sm" style="background:${c}; border: ${s.color === c ? '2px solid #1E293B' : '2px solid white'}"></div>
            `).join('')}
          </div>
          ${!window.isReadOnly ? `<button onclick="removeStep(${i})" style="border:none; background:none; color:#FCA5A5; cursor:pointer;"><i data-lucide="trash-2" size="16"></i></button>` : ''}
        </div>
        <textarea oninput="window.currentSteps[${i}].note=this.value" ${window.isReadOnly ? 'disabled' : ''} 
                  placeholder="รายละเอียด..." style="width:100%; border:none; padding:12px; font-size:13px; outline:none; resize:none; font-family: inherit; color: #64748B;">${s.note}</textarea>
      </div>
    `).join('');
    lucide.createIcons();
  };

  window.addNewStep = () => {
    window.currentSteps.push({ text: '', note: '', color: '#CBD5E1' });
    renderStepsList();
  };

  window.updateStepColor = (i, color) => {
    window.currentSteps[i].color = color;
    renderStepsList();
  };

  window.removeStep = (i) => { window.currentSteps.splice(i, 1); renderStepsList(); };

  function renderFooter() {
    const footer = document.getElementById('modalFooter');
    if(window.isReadOnly) {
        footer.innerHTML = `
          <button onclick="closeModal()" style="grid-column: span 2; padding:12px; border:1px solid #E2E8F0; background:#F8FAFC; border-radius:12px; cursor:pointer; font-weight:600;">ปิดหน้าต่าง</button>
        `;
    } else {
        footer.innerHTML = `
          <button onclick="closeModal()" style="padding:12px; border:1px solid #E2E8F0; background:#F8FAFC; border-radius:12px; cursor:pointer; font-weight:600;">ยกเลิก</button>
          <button id="saveBtn" onclick="saveTemplate()" class="btn-primary" style="justify-content:center;">บันทึกข้อมูล</button>
        `;
    }
  }

  window.closeModal = () => document.getElementById('modal').style.display = 'none';
  lucide.createIcons();
</script>
</body>
</html>
